version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://mangorack:${POSTGRES_PASSWORD:-CHANGE_ME_BEFORE_DEPLOYING}@db:5432/mangorack
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=mangorack
      - POSTGRES_USER=mangorack
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-CHANGE_ME_BEFORE_DEPLOYING}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mangorack"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: .
    restart: unless-stopped
    command: ["npx", "tsx", "src/workers/index.ts"]
    environment:
      - DATABASE_URL=postgresql://mangorack:${POSTGRES_PASSWORD:-CHANGE_ME_BEFORE_DEPLOYING}@db:5432/mangorack
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme_redis}@redis:6379
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
